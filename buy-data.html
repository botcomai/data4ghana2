<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Services | Data4Ghana</title>

<link rel="stylesheet" href="css/menu.css">
<link rel="stylesheet" href="css/buy-data.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<!-- Supabase Database Connection --><script src="js/supabase.js"></script>

</head>
<body>

<div id="menu-container"></div>

<div class="container">

  <h2>📶 Our Services</h2>
  <p class="subtitle" id="pageSubtitle">Purchase and manage your data bundles</p>

  <!-- USER ROLE INFO BANNER -->
  <div id="userInfoBanner" style="display:none; background:linear-gradient(135deg,rgba(42,125,225,0.12),rgba(109,40,217,0.08)); border:1px solid rgba(42,125,225,0.2); border-radius:12px; padding:12px 16px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">
    <div style="display:flex; align-items:center; gap:10px;">
      <div id="bannerAvatar" style="width:36px; height:36px; background:linear-gradient(135deg,#2a7de1,#6d28d9); border-radius:10px; display:flex; align-items:center; justify-content:center; color:white; font-weight:800; font-size:13px;">D4</div>
      <div>
        <div id="bannerName" style="font-weight:700; font-size:13px; color:#1e293b;">Loading...</div>
        <div id="bannerEmail" style="font-size:11px; color:#64748b;">—</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
      <span id="bannerRole" style="padding:4px 10px; border-radius:20px; font-size:11px; font-weight:800; background:rgba(42,125,225,0.15); color:#2a7de1;">LOADING...</span>
      <span style="font-size:11px; color:#64748b;">Rate:</span>
      <span id="bannerRate" style="font-size:13px; font-weight:800; color:#059669;">₵—/GB</span>
      <span style="font-size:11px; color:#64748b;">|</span>
      <span style="font-size:11px; color:#64748b;">Wallet:</span>
      <span id="bannerWallet" style="font-size:13px; font-weight:800; color:#0f172a;">₵0.00</span>
    </div>
  </div>

  <!-- NETWORK SELECTION -->
  <label style="margin-top:0;">Select Network</label>
  <div class="network-grid">
    <div class="network active" onclick="selectNetwork(this)">
      <img src="images/mtn.png">
      <p>MTN</p>
    </div>
    <div class="network" onclick="selectNetwork(this)">
      <img src="images/telecel.png">
      <p>Telecel</p>
    </div>
    <div class="network" onclick="selectNetwork(this)">
      <img src="images/airteltigo.png">
      <p>Ishare</p>
    </div>
    <div class="network" onclick="selectNetwork(this)">
      <img src="images/bigtime.png">
      <p>Bigtime</p>
    </div>
  </div>

  <!-- PHONE -->
  <label>Recipient Phone Number</label>
  <input type="text" id="phone" placeholder="0240000000" maxlength="10">

  <!-- BUNDLE -->
  <label>Bundle Size</label>
  <select id="bundle">
    <option value="">— Select size —</option>
  </select>

  <!-- PRICE PREVIEW -->
  <div id="pricePreview" style="display:none; margin-top:10px; padding:10px 14px; background:rgba(5,150,105,0.07); border:1px solid rgba(5,150,105,0.2); border-radius:10px; font-size:13px; color:#065f46; font-weight:600;">
    💰 <span id="pricePreviewText">—</span>
  </div>

  <!-- ADD TO CART BUTTON -->
  <button class="add-cart" onclick="addToCart()">+ Add to Cart</button>

  <!-- BULK PURCHASE BUTTON — links to dedicated page -->
  <a href="bulk-order.html" class="bulk-toggle-btn" style="text-decoration:none; display:flex; align-items:center; justify-content:center; gap:8px;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Bulk Purchase &rarr;
  </a>

  <!-- CART -->
  <div class="cart" id="cartSection">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
      <h3 style="margin:0;">🛒 Cart</h3>
      <span id="cartCount" style="background:rgba(42,125,225,0.12); color:#2a7de1; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;">0 items</span>
    </div>
    <div id="cartItems">
      <p style="color:#94a3b8; font-size:13px; text-align:center; padding:10px 0;">Your cart is empty</p>
    </div>
    <div id="cartTotal" style="display:none;"></div>
  </div>

  <button class="pay-btn" onclick="makePayment()">Pay Now</button>

</div>

<script src="js/menu.js"></script>
<script src="js/api-service.js"></script>
<script src="js/buy-data.js"></script>

</body>
</html>
